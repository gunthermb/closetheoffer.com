<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — CloseTheOffer</title>
<script src="/aws-config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7ff;min-height:100vh;display:flex;align-items:center;justify-content:center}
.loading{text-align:center;color:#64748b}
.loading .spinner{width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:#6c5ce7;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:.9375rem;color:#64748b}
</style>
</head>
<body>

<!-- Auth gate: checks session then loads the real app -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <p>Loading your dashboard…</p>
</div>

<script>
/*
  Auth gate (Amazon Cognito): finish any Google hosted-UI redirect (?code=...),
  then require a valid session before loading the app.
*/
(async () => {
  // Not configured yet → load the app directly so local development still works.
  if (typeof AWS_CONFIGURED !== 'undefined' && !AWS_CONFIGURED) {
    window.location.replace('/app.html');
    return;
  }

  // If we came back from "Continue with Google", exchange the code for tokens.
  try { await ctoHandleOAuthRedirect(); } catch (e) {}

  if (!ctoTokenValid()) {
    window.location.replace('/login');
    return;
  }

  window.location.replace('/app.html');
})();
</script>

</body>
</html>
