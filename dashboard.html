<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — CloseTheOffer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/supabase-config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7ff;min-height:100vh;display:flex;align-items:center;justify-content:center}
.loading{text-align:center;color:#64748b}
.loading .spinner{width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:#6c5ce7;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:.9375rem;color:#64748b}
</style>
</head>
<body>

<!-- Auth gate: checks session then loads the real app -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <p>Loading your dashboard…</p>
</div>

<script>
/*
  Auth gate: require a valid Supabase session, then load the app.
  Also handles the OAuth callback (Supabase reads the token from the URL
  via detectSessionInUrl, set in supabase-config.js).
*/
(async () => {
  const sb = getSupabase();

  // Not configured yet → load the app directly so local development still works.
  if (!sb) {
    window.location.replace('/app.html');
    return;
  }

  // After Google OAuth the session may still be settling from the URL hash.
  let { data } = await sb.auth.getSession();
  if (!data.session && window.location.hash.includes('access_token')) {
    await new Promise(r => setTimeout(r, 400));
    ({ data } = await sb.auth.getSession());
  }

  if (!data.session) {
    window.location.replace('/login');
    return;
  }

  window.location.replace('/app.html');
})();
</script>

</body>
</html>
