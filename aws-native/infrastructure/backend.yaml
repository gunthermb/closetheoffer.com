AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  CloseTheOffer AWS-native backend — Cognito (auth), HTTP API + Lambda (Bedrock
  resume scan), DynamoDB (per-user data). Replaces Supabase and the Anthropic API.

Parameters:
  AppName:
    Type: String
    Default: closetheoffer
  CallbackURL:
    Type: String
    Default: https://closetheoffer.com/dashboard
    Description: Where Cognito Hosted UI / Google returns after sign-in.
  LogoutURL:
    Type: String
    Default: https://closetheoffer.com/login
  AllowedOrigin:
    Type: String
    Default: '*'
    Description: CORS origin allowed to call the API (the JWT is the real guard).
  BedrockModelId:
    Type: String
    Default: us.anthropic.claude-haiku-4-5-20251001-v1:0
    Description: A callable Bedrock model/inference-profile ID (region-prefixed for inference profiles).
  GoogleClientId:
    Type: String
    Default: ''
    Description: (Optional) Google OAuth client ID to enable "Continue with Google".
  GoogleClientSecret:
    Type: String
    Default: ''
    NoEcho: true

Conditions:
  HasGoogle: !Not [!Equals [!Ref GoogleClientId, '']]

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 30
    MemorySize: 256
    Architectures: [arm64]

Resources:

  # ── Auth: Cognito User Pool ──────────────────────────────
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${AppName}-users'
      AutoVerifiedAttributes: [email]
      UsernameAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireUppercase: false
          RequireSymbols: false
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  GoogleIdP:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: HasGoogle
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: 'openid email profile'
      AttributeMapping:
        email: email
        name: name

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${AppName}-web'
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      # Referencing !Ref GoogleIdP (returns "Google") also orders creation correctly.
      SupportedIdentityProviders: !If
        - HasGoogle
        - [COGNITO, !Ref GoogleIdP]
        - [COGNITO]
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, email, profile]
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs: [!Ref CallbackURL]
      LogoutURLs: [!Ref LogoutURL]

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref UserPool
      Domain: !Sub '${AppName}-auth-${AWS::AccountId}'

  # ── Data: DynamoDB (per-user) ────────────────────────────
  DataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AppName}-data'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: item
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: item
          KeyType: RANGE

  # ── API: HTTP API with Cognito JWT authorizer ────────────
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins: [!Ref AllowedOrigin]
        AllowHeaders: [authorization, content-type]
        AllowMethods: [GET, POST, OPTIONS]
      Auth:
        Authorizers:
          CognitoJwt:
            IdentitySource: '$request.header.Authorization'
            JwtConfiguration:
              issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}'
              audience: [!Ref UserPoolClient]
        DefaultAuthorizer: CognitoJwt

  ResumeScanFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      CodeUri: ../src/resume-scan/
      Environment:
        Variables:
          BEDROCK_MODEL_ID: !Ref BedrockModelId
      Policies:
        - Statement:
            # Inference profiles route across regions, so allow the profile in this
            # account plus the underlying foundation models in any region.
            - Effect: Allow
              Action: ['bedrock:InvokeModel', 'bedrock:InvokeModelWithResponseStream']
              Resource:
                - 'arn:aws:bedrock:*::foundation-model/*'
                - !Sub 'arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/*'
      Events:
        Scan:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /scan
            Method: POST

  DataFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      CodeUri: ../src/data/
      Environment:
        Variables:
          TABLE_NAME: !Ref DataTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DataTable
      Events:
        GetData:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /data
            Method: GET
        PutData:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /data
            Method: POST

Outputs:
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  HostedUIDomain:
    Value: !Sub 'https://${AppName}-auth-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com'
  ApiBaseUrl:
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  Region:
    Value: !Ref AWS::Region
